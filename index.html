<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Lead Finder (OSM)</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, select, button { padding: 8px; margin: 5px; }
    .card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
    .bad { border-left: 5px solid red; }
  </style>
</head>
<body>

<h2>Lead Finder für lokale Unternehmen</h2>

<input id="place" placeholder="Ort (z.B. Ljubljana)" />
<select id="category">
  <option value="restaurant">Restaurant</option>
  <option value="hairdresser">Friseur</option>
  <option value="car_repair">Autowerkstatt</option>
  <option value="cafe">Café</option>
  <option value="beauty">Kosmetik</option>
</select>

<button onclick="search()">Suchen</button>

<div id="results"></div>

<script>
async function geocode(place) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.length) throw new Error("Ort nicht gefunden");
  return data[0];
}

function isBadWebsite(url) {
  if (!url) return true;
  const badPatterns = ["facebook", "instagram", "linktr", "google"];
  return badPatterns.some(p => url.includes(p));
}

async function search() {
  const place = document.getElementById("place").value;
  const category = document.getElementById("category").value;
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "Lade...";

  try {
    const geo = await geocode(place);
    const bbox = geo.boundingbox;

    const query = `
      [out:json][timeout:25];
      (
        node["amenity"="${category}"](${bbox[0]},${bbox[2]},${bbox[1]},${bbox[3]});
        way["amenity"="${category}"](${bbox[0]},${bbox[2]},${bbox[1]},${bbox[3]});
      );
      out center tags;
    `;

    const url = "https://overpass-api.de/api/interpreter";
    const res = await fetch(url, {
      method: "POST",
      body: query
    });

    const data = await res.json();

    resultsDiv.innerHTML = "";

    data.elements.forEach(el => {
      const tags = el.tags || {};
      const name = tags.name || "Ohne Namen";
      const website = tags.website || "";
      const phone = tags.phone || "";
      const email = tags.email || "";

      if (!isBadWebsite(website)) return; // nur schlechte Leads

      const div = document.createElement("div");
      div.className = "card bad";

      div.innerHTML = `
        <b>${name}</b><br>
        Website: ${website || "keine"}<br>
        Telefon: ${phone || "keine"}<br>
        E-Mail: ${email || "keine"}
      `;

      resultsDiv.appendChild(div);
    });

  } catch (e) {
    resultsDiv.innerHTML = "Fehler: " + e.message;
  }
}
</script>

</body>
</html>
