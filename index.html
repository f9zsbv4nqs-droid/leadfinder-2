<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LocalLeads AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: #e5e7eb;
}

header {
  padding: 16px;
  background: #0f172a;
  border-bottom: 1px solid #1f2937;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
  font-size: 18px;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

input, select, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
}

button {
  background: #3b82f6;
  cursor: pointer;
}

#loadingWrap {
  padding: 15px 20px;
}

#results {
  padding: 18px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 12px;
  padding: 12px;
}

.title {
  font-weight: 700;
  margin-bottom: 6px;
}

.score {
  margin-top: 8px;
  font-weight: bold;
}

.small {
  font-size: 12px;
  color: #9ca3af;
}

</style>
</head>

<body>

<header>

<div class="logo">🧲 LocalLeads AI</div>

<div class="controls">

<input id="place" placeholder="Ort (z.B. Ljubljana)" />

<select id="category">
  <option value="restaurant">Restaurant</option>
  <option value="cafe">Café</option>
  <option value="shop=hairdresser">Friseur</option>
  <option value="shop=beauty">Beauty</option>
  <option value="shop=car_repair">Autowerkstatt</option>
  <option value="shop=plumber">Installateur</option>
  <option value="shop=electrician">Elektriker</option>
</select>

<select id="limit">
  <option value="20">20</option>
  <option value="50">50</option>
  <option value="100">100</option>
</select>

<button onclick="search()">Search</button>

</div>
</header>

<!-- LOADER -->
<div id="loadingWrap" style="display:none;">
  <div>Loading Leads... <span id="percent">0%</span></div>

  <div style="width:100%; height:10px; background:#1f2937; border-radius:10px; overflow:hidden; margin-top:8px;">
    <div id="bar" style="height:100%; width:0%; background:#3b82f6;"></div>
  </div>

  <div id="step" style="margin-top:6px; font-size:12px; color:#9ca3af;">
    Initialisierung...
  </div>
</div>

<div id="results"></div>

<script>

let progress = 0;
let interval;

/* ---------------- LOADER ---------------- */

function setProgress(val, stepText) {
  progress = Math.min(100, val);

  document.getElementById("percent").innerText = Math.round(progress) + "%";
  document.getElementById("bar").style.width = progress + "%";

  if (stepText) {
    document.getElementById("step").innerText = stepText;
  }
}

function startLoading() {
  document.getElementById("loadingWrap").style.display = "block";
  setProgress(0, "Initialisierung...");

  interval = setInterval(() => {
    if (progress < 85) {
      setProgress(progress + Math.random() * 4);
    }
  }, 200);
}

function stopLoading() {
  clearInterval(interval);
  setProgress(100, "Fertig");

  setTimeout(() => {
    document.getElementById("loadingWrap").style.display = "none";
  }, 400);
}

/* ---------------- HELPERS ---------------- */

function getWebsite(t) {
  return t.website || t["contact:website"] || t.url || "";
}

function isSocial(url) {
  if (!url) return false;
  url = url.toLowerCase();
  return url.includes("facebook") ||
         url.includes("instagram") ||
         url.includes("linktr");
}

function scoreLead(t) {
  let score = 50;

  const website = getWebsite(t);

  if (!website) score += 35;
  else if (isSocial(website)) score += 25;
  else score -= 20;

  if (!t.phone) score += 10;
  if (!t.email) score += 10;

  return Math.max(0, Math.min(100, score));
}

/* ---------------- GEOCODE ---------------- */

async function geocode(place) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`);
  const data = await res.json();
  if (!data.length) throw new Error("Ort nicht gefunden");
  return data[0];
}

/* ---------------- MAIN SEARCH ---------------- */

async function search() {

  startLoading();

  const place = document.getElementById("place").value;
  const category = document.getElementById("category").value;
  const limit = +document.getElementById("limit").value;

  const results = document.getElementById("results");
  results.innerHTML = "";

  try {

    setProgress(15, "Ort wird geladen...");

    const geo = await geocode(place);

    setProgress(35, "Unternehmen werden gesucht...");

    const b = geo.boundingbox;

    let filter = "";
    if (category.includes("=")) {
      const [k,v] = category.split("=");
      filter = `node["${k}"="${v}"]`;
    } else {
      filter = `node["amenity"="${category}"]`;
    }

    const query = `
    [out:json][timeout:25];
    (
      ${filter}(${b[0]},${b[2]},${b[1]},${b[3]});
    );
    out center tags;
    `;

    setProgress(60, "Daten werden geladen...");

    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    });

    const data = await res.json();

    setProgress(80, "Leads werden bewertet...");

    const seen = new Set();
    let leads = [];

    for (const el of data.elements) {
      const t = el.tags || {};
      const name = t.name || "Unknown";

      if (seen.has(name)) continue;
      seen.add(name);

      leads.push({
        name,
        tags: t,
        score: scoreLead(t)
      });
    }

    leads.sort((a,b) => b.score - a.score);
    leads = leads.slice(0, limit);

    results.innerHTML = "";

    for (const l of leads) {

      const t = l.tags;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="title">${l.name}</div>
        <div class="small">
          🌐 ${getWebsite(t) || "no website"}<br>
          📞 ${t.phone || "no phone"}
        </div>
        <div class="score">Score: ${l.score}/100</div>
      `;

      results.appendChild(card);
    }

    setProgress(100, "Fertig");
    stopLoading();

  } catch (err) {
    stopLoading();
    results.innerHTML = "Fehler: " + err.message;
  }
}

</script>

</body>
</html>
