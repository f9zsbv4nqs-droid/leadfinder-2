<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeadNova AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #070b14;
  color: #e5e7eb;
}

/* ---------------- START SCREEN ---------------- */
#startScreen {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #111827, #05070f);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.startBox {
  text-align: center;
  width: 320px;
}

.logo {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: #111827;
  color: white;
}

button {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  width: 100%;
}

/* MAIN APP */
#app {
  display: none;
}

/* HEADER */
header {
  padding: 14px;
  background: #0f172a;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1f2937;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

select, input, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
}

button { background:#3b82f6; }

/* LOADER */
#loadingWrap {
  padding: 10px 14px;
  display: none;
}

#barContainer {
  width: 100%;
  height: 10px;
  background: #1f2937;
  border-radius: 10px;
  overflow: hidden;
}

#bar {
  height: 100%;
  width: 0%;
  background: #3b82f6;
}

/* RESULTS */
#container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: calc(100vh - 70px);
}

#results {
  overflow: auto;
  padding: 10px;
  display: grid;
  gap: 10px;
}

.card {
  background: #111827;
  border-radius: 12px;
  padding: 10px;
  border: 1px solid #1f2937;
  cursor: pointer;
}

.card:hover {
  border-color: #3b82f6;
}

/* MODAL */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

#modalContent {
  width: 360px;
  background: #111827;
  padding: 14px;
  border-radius: 12px;
}

#map {
  height: 220px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="startBox">
    <div class="logo">🧠 LeadNova AI</div>
    <div id="greet">Willkommen</div>

    <input id="name" placeholder="Dein Name">

    <button onclick="startApp()">Start</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>
  <div>🧠 LeadNova AI</div>

  <div class="controls">

    <input id="place" placeholder="Ort">

    <select id="category">
      <option value="restaurant">Restaurant</option>
      <option value="cafe">Café</option>
      <option value="shop=hairdresser">Friseur</option>
      <option value="shop=beauty">Beauty</option>
      <option value="shop=car_repair">Auto</option>
    </select>

    <input type="range" id="limit" min="10" max="80" value="30">
    <span id="limitVal">30</span>

    <button onclick="search()">Search</button>

  </div>
</header>

<!-- LOADER -->
<div id="loadingWrap">
  <div>Loading... <span id="percent">0%</span></div>
  <div id="barContainer"><div id="bar"></div></div>
  <div id="step"></div>
</div>

<div id="container">

  <div id="results"></div>
  <div id="map"></div>

</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <div id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let progress=0, interval;
let userName="";

function getTimeGreeting(){
  let h=new Date().getHours();
  if(h<12)return"Guten Morgen";
  if(h<18)return"Guten Nachmittag";
  return"Guten Abend";
}

/* START SCREEN */
function startApp(){
  userName=document.getElementById("name").value||"User";

  document.getElementById("greet").innerText =
    getTimeGreeting()+", "+userName;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("app").style.display="block";
}

/* SLIDER FIX */
document.addEventListener("DOMContentLoaded",()=>{
  const s=document.getElementById("limit");
  const l=document.getElementById("limitVal");
  l.innerText=s.value;
  s.oninput=()=>l.innerText=s.value;
});

/* LOADER */
function setProgress(v,t){
  progress=Math.min(100,v);
  document.getElementById("percent").innerText=Math.round(v)+"%";
  document.getElementById("bar").style.width=v+"%";
  if(t)document.getElementById("step").innerText=t;
}

function startLoading(){
  document.getElementById("loadingWrap").style.display="block";
  setProgress(0,"Thinking...");

  interval=setInterval(()=>{
    if(progress<85)setProgress(progress+Math.random()*4);
  },200);
}

function stopLoading(){
  clearInterval(interval);
  setProgress(100,"Done");
  setTimeout(()=>{
    document.getElementById("loadingWrap").style.display="none";
  },400);
}

/* CORE */
function getWebsite(t){
  return t.website||t["contact:website"]||"";
}

function score(t){
  let s=50;
  if(!getWebsite(t))s+=30;
  if(!t.phone)s+=10;
  return Math.min(100,s);
}

async function geocode(p){
  let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${p}`);
  let d=await r.json();
  return d[0];
}

/* SEARCH */
async function search(){

  startLoading();

  try{

    const place=document.getElementById("place").value;
    const cat=document.getElementById("category").value;
    const limit=+document.getElementById("limit").value;

    const geo=await geocode(place);

    setProgress(40,"Scanning area...");

    const b=geo.boundingbox;

    const filter=cat.includes("=")
      ?`node["${cat.split("=")[0]}"="${cat.split("=")[1]}"]`
      :`node["amenity"="${cat}"]`;

    const q=`[out:json];
    (${filter}(${b[0]},${b[2]},${b[1]},${b[3]}));
    out;`;

    const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:q});
    const d=await r.json();

    setProgress(75,"Ranking leads...");

    let leads=d.elements.map(e=>({
      name:e.tags?.name||"unknown",
      tags:e.tags||{},
      lat:e.lat,
      lon:e.lon,
      score:score(e.tags||{})
    }));

    leads.sort((a,b)=>b.score-a.score);
    leads=leads.slice(0,limit);

    const resDiv=document.getElementById("results");
    resDiv.innerHTML="";

    leads.forEach(l=>{

      let div=document.createElement("div");
      div.className="card";
      div.innerHTML=`${l.name}<br>Score: ${l.score}`;
      div.onclick=()=>openModal(l);
      resDiv.appendChild(div);

    });

    setProgress(100,"Done");
    stopLoading();

  }catch(e){
    stopLoading();
    alert(e.message);
  }
}

/* MODAL */
let map;

function openModal(l){

  document.getElementById("modal").style.display="flex";

  document.getElementById("modalContent").innerHTML=`
    <h3>${l.name}</h3>
    <p>Score: ${l.score}</p>
    <div id="map"></div>
  `;

  setTimeout(()=>{

    if(map)map.remove();

    map=L.map("map").setView([l.lat,l.lon],16);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
      attribution:"OSM"
    }).addTo(map);

    L.marker([l.lat,l.lon]).addTo(map);

  },100);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  if(map)map.remove();
}

</script>
</body>
</html>
