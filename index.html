<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LocalLeads AI v5</title>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: #e5e7eb;
}

header {
  padding: 14px;
  background: #0f172a;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  border-bottom: 1px solid #1f2937;
}

.logo {
  font-weight: 700;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
}

button {
  background: #3b82f6;
  cursor: pointer;
}

/* layout */
#container {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  height: calc(100vh - 70px);
}

#map {
  height: 100%;
}

#results {
  overflow: auto;
  padding: 10px;
  display: grid;
  gap: 10px;
}

/* card */
.card {
  background: #111827;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #1f2937;
  cursor: pointer;
}

.card:hover {
  border-color: #3b82f6;
}

.title {
  font-weight: bold;
}

.score {
  font-size: 12px;
  margin-top: 6px;
}

/* loader */
#loadingWrap {
  padding: 10px 14px;
  display: none;
}

/* modal */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

#modalContent {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}

</style>
</head>

<body>

<header>
  <div class="logo">🧲 LocalLeads AI v5</div>

  <div class="controls">
    <input id="place" placeholder="Ort" />

    <select id="category">
      <option value="restaurant">Restaurant</option>
      <option value="cafe">Café</option>
      <option value="shop=hairdresser">Friseur</option>
      <option value="shop=beauty">Beauty</option>
      <option value="shop=car_repair">Auto</option>
      <option value="shop=plumber">Installateur</option>
    </select>

    <div style="display:flex; align-items:center; gap:6px;">
      <span>Leads</span>
      <input type="range" id="limit" min="10" max="80" value="30">
      <span id="limitVal">30</span>
    </div>

    <button onclick="search()">Search</button>
  </div>
</header>

<div id="loadingWrap">Loading...</div>

<div id="container">
  <div id="map"></div>
  <div id="results"></div>
</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <div id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([46.05, 14.5], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OSM'
}).addTo(map);

let markers = [];

/* slider */
document.getElementById("limit").oninput = e => {
  document.getElementById("limitVal").innerText = e.target.value;
};

/* helpers */
function getWebsite(t){
  return t.website || t["contact:website"] || "";
}

function score(t){
  let s = 50;
  if(!getWebsite(t)) s += 30;
  if(!t.phone) s += 10;
  return Math.min(100,s);
}

/* geocode */
async function geocode(p){
  let r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${p}`);
  let d = await r.json();
  return d[0];
}

/* modal */
function openModal(l){
  document.getElementById("modal").style.display="flex";

  document.getElementById("modalContent").innerHTML=`
    <h3>${l.name}</h3>
    <p>🌐 ${getWebsite(l.tags)||"none"}</p>
    <p>📞 ${l.tags.phone||"none"}</p>
    <p>📍 ${l.tags["addr:street"]||""} ${l.tags["addr:housenumber"]||""}</p>
    <p>⭐ Score: ${l.score}</p>
  `;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* search */
async function search(){

  document.getElementById("loadingWrap").style.display="block";

  const place=document.getElementById("place").value;
  const cat=document.getElementById("category").value;
  const limit=+document.getElementById("limit").value;

  const geo=await geocode(place);
  const b=geo.boundingbox;

  let filter=cat.includes("=")?
    `node["${cat.split("=")[0]}"="${cat.split("=")[1]}"]`
    :`node["amenity"="${cat}"]`;

  let q=`[out:json];
  (${filter}(${b[0]},${b[2]},${b[1]},${b[3]}));
  out;`;

  let r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:q});
  let d=await r.json();

  let leads=[];

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  document.getElementById("results").innerHTML="";

  for(let e of d.elements){

    let t=e.tags||{};
    let name=t.name||"unknown";

    let l={
      name,
      tags:t,
      score:score(t),
      lat:e.lat,
      lon:e.lon
    };

    leads.push(l);
  }

  leads.sort((a,b)=>b.score-a.score);
  leads=leads.slice(0,limit);

  leads.forEach(l=>{

    let marker=L.marker([l.lat,l.lon]).addTo(map)
    .on("click",()=>openModal(l));

    markers.push(marker);

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div class="title">${l.name}</div>
      <div>Score: ${l.score}</div>
    `;
    div.onclick=()=>openModal(l);

    document.getElementById("results").appendChild(div);
  });

  document.getElementById("loadingWrap").style.display="none";
}

</script>

</body>
</html>
