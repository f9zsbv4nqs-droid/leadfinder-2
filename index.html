<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LocalLeads AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: #e5e7eb;
}

/* HEADER */
header {
  padding: 18px;
  background: #0f172a;
  border-bottom: 1px solid #1f2937;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
  font-size: 18px;
}

.logo svg {
  width: 28px;
  height: 28px;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

input, select, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
}

button {
  background: #3b82f6;
  cursor: pointer;
}

/* SLIDER */
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}

/* RESULTS */
#results {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 12px;
  padding: 12px;
}

.title {
  font-weight: bold;
  margin-bottom: 6px;
}

.score {
  font-size: 12px;
  padding: 3px 8px;
  background: #1f2937;
  display: inline-block;
  border-radius: 6px;
  margin-top: 8px;
}
</style>
</head>

<body>

<header>

<div class="logo">
<svg viewBox="0 0 24 24" fill="none">
<path d="M4 19V5l16-2v18l-16-2z" stroke="#3b82f6" stroke-width="2"/>
<path d="M8 8h8M8 12h8M8 16h5" stroke="#60a5fa" stroke-width="2"/>
</svg>
LocalLeads AI
</div>

<div class="controls">

<input id="place" placeholder="Ort (z.B. Ljubljana)" />

<select id="category">
  <option value="restaurant">Restaurant</option>
  <option value="cafe">Café</option>
  <option value="shop=hairdresser">Friseur</option>
  <option value="shop=beauty">Beauty</option>
  <option value="shop=car_repair">Autowerkstatt</option>
  <option value="shop=plumber">Installateur</option>
  <option value="shop=electrician">Elektriker</option>
  <option value="shop=florist">Florist</option>
</select>

<div class="slider-wrap">
  Leads:
  <input type="range" id="limit" min="10" max="100" value="30">
  <span id="limitVal">30</span>
</div>

<button onclick="search()">Search</button>

</div>
</header>

<div id="results"></div>

<script>

document.getElementById("limit").oninput = (e) => {
  document.getElementById("limitVal").innerText = e.target.value;
};

async function geocode(place) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`);
  const data = await res.json();
  if (!data.length) throw new Error("Ort nicht gefunden");
  return data[0];
}

function getWebsite(tags) {
  return tags.website || tags["contact:website"] || tags.url || "";
}

function scoreLead(tags) {
  let score = 50;

  const website = getWebsite(tags).toLowerCase();

  if (!website) score += 30;
  if (website.includes("facebook") || website.includes("instagram")) score += 20;

  if (tags.phone) score -= 10;
  if (tags.email) score -= 10;

  return Math.max(0, Math.min(100, score));
}

async function search() {

  const place = document.getElementById("place").value;
  const category = document.getElementById("category").value;
  const limit = +document.getElementById("limit").value;

  const results = document.getElementById("results");
  results.innerHTML = "Loading...";

  const geo = await geocode(place);
  const b = geo.boundingbox;

  let filter = "";
  if (category.includes("=")) {
    const [k,v] = category.split("=");
    filter = `node["${k}"="${v}"]`;
  } else {
    filter = `node["amenity"="${category}"]`;
  }

  const query = `
  [out:json][timeout:25];
  (
    ${filter}(${b[0]},${b[2]},${b[1]},${b[3]});
  );
  out center tags;
  `;

  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  });

  const data = await res.json();

  results.innerHTML = "";

  let count = 0;

  for (const el of data.elements) {
    if (count >= limit) break;

    const t = el.tags || {};
    const name = t.name || "Unknown";

    const website = getWebsite(t);
    const score = scoreLead(t);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${name}</div>
      <div>🌐 ${website || "no website listed"}</div>
      <div>📞 ${t.phone || "no phone"}</div>
      <div class="score">Lead Score: ${score}/100</div>
    `;

    results.appendChild(card);
    count++;
  }

  if (!count) {
    results.innerHTML = "No results found";
  }
}
</script>

</body>
</html>
