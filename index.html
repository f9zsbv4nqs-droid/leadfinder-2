<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LocalLeads AI v4</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: #e5e7eb;
}

header {
  padding: 16px;
  background: #0f172a;
  border-bottom: 1px solid #1f2937;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
  font-size: 18px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

input, select, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
}

button {
  background: #3b82f6;
  cursor: pointer;
}

#results {
  padding: 18px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 12px;
  padding: 12px;
}

.title {
  font-weight: 700;
  margin-bottom: 6px;
}

.badge {
  display: inline-block;
  font-size: 12px;
  padding: 3px 8px;
  background: #1f2937;
  border-radius: 6px;
  margin-top: 6px;
}

.score {
  margin-top: 8px;
  font-weight: bold;
}

.small {
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<header>

<div class="logo">🧲 LocalLeads AI v4</div>

<div class="controls">

<input id="place" placeholder="Ort (z.B. Ljubljana)" />

<select id="category">
  <option value="restaurant">Restaurant</option>
  <option value="cafe">Café</option>
  <option value="shop=hairdresser">Friseur</option>
  <option value="shop=beauty">Beauty</option>
  <option value="shop=car_repair">Autowerkstatt</option>
  <option value="shop=plumber">Installateur</option>
  <option value="shop=electrician">Elektriker</option>
  <option value="shop=construction">Bau</option>
</select>

<select id="limit">
  <option value="20">20</option>
  <option value="50">50</option>
  <option value="100">100</option>
</select>

<button onclick="search()">Search</button>

</div>
</header>

<div id="results"></div>

<script>

/* -----------------------------
   WEBSITE CHECK
------------------------------*/
function getWebsite(t) {
  return t.website || t["contact:website"] || t.url || "";
}

function isSocial(url) {
  if (!url) return false;
  url = url.toLowerCase();
  return url.includes("facebook") ||
         url.includes("instagram") ||
         url.includes("linktr");
}

/* -----------------------------
   SCORE ENGINE (REAL VERSION)
------------------------------*/
function scoreLead(t, google = null) {

  let score = 50;

  const website = getWebsite(t);

  if (!website) score += 35;
  else if (isSocial(website)) score += 25;
  else score -= 20;

  if (!t.phone) score += 10;
  if (!t.email) score += 10;

  // Google enrichment (optional)
  if (google) {
    if (google.rating && google.rating > 4.2) score -= 10;
    if (google.user_ratings_total > 20) score -= 10;
  }

  return Math.max(0, Math.min(100, score));
}

/* -----------------------------
   GOOGLE PLACES (optional)
   NOTE: API KEY NEEDED
------------------------------*/
async function googleSearch(name, location) {
  // OPTIONAL: placeholder (disabled by default)
  return null;
}

/* -----------------------------
   GEOCODE
------------------------------*/
async function geocode(place) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`);
  const data = await res.json();
  if (!data.length) throw new Error("Ort nicht gefunden");
  return data[0];
}

/* -----------------------------
   MAIN SEARCH
------------------------------*/
async function search() {

  const place = document.getElementById("place").value;
  const category = document.getElementById("category").value;
  const limit = +document.getElementById("limit").value;

  const results = document.getElementById("results");
  results.innerHTML = "Loading...";

  const geo = await geocode(place);
  const b = geo.boundingbox;

  let filter = "";
  if (category.includes("=")) {
    const [k,v] = category.split("=");
    filter = `node["${k}"="${v}"]`;
  } else {
    filter = `node["amenity"="${category}"]`;
  }

  const query = `
  [out:json][timeout:25];
  (
    ${filter}(${b[0]},${b[2]},${b[1]},${b[3]});
  );
  out center tags;
  `;

  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  });

  const data = await res.json();

  /* -------------------------
     DEDUPLICATION
  --------------------------*/
  const seen = new Set();
  let leads = [];

  for (const el of data.elements) {

    const t = el.tags || {};
    const name = t.name || "Unknown";

    if (seen.has(name)) continue;
    seen.add(name);

    const score = scoreLead(t);

    leads.push({
      name,
      tags: t,
      score
    });
  }

  /* SORT BY QUALITY */
  leads.sort((a,b) => b.score - a.score);

  /* LIMIT */
  leads = leads.slice(0, limit);

  /* RENDER */
  results.innerHTML = "";

  for (const l of leads) {

    const t = l.tags;
    const website = getWebsite(t);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${l.name}</div>

      <div class="small">
        🌐 ${website || "no website"}<br>
        📞 ${t.phone || "no phone"}<br>
        📍 ${t["addr:city"] || ""}
      </div>

      <div class="score">Score: ${l.score}/100</div>

      <div class="badge">OSM Lead</div>
    `;

    results.appendChild(card);
  }

  if (!leads.length) {
    results.innerHTML = "No leads found";
  }
}

</script>

</body>
</html>
