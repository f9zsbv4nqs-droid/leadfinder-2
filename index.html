<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lead Finder Pro</title>

  <style>
    body {
      font-family: system-ui, Arial;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 20px;
      background: #111827;
      position: sticky;
      top: 0;
      border-bottom: 1px solid #1f2937;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 10px 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    input, select {
      background: #1f2937;
      color: white;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    #results {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 15px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #3b82f6;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .bad {
      border-left: 4px solid #ef4444;
    }

    .meta {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      background: #1f2937;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<header>
  <h1>Lead Finder Pro (OSM)</h1>

  <div class="controls">
    <input id="place" placeholder="Ort (z.B. Ljubljana)" />

    <select id="category">
      <option value="restaurant">Restaurant</option>
      <option value="hairdresser">Friseur</option>
      <option value="car_repair">Autowerkstatt</option>
      <option value="cafe">Café</option>
      <option value="beauty">Kosmetik</option>
    </select>

    <select id="limit">
      <option value="20">20 Leads</option>
      <option value="50">50 Leads</option>
      <option value="100">100 Leads</option>
    </select>

    <button onclick="search()">Suchen</button>
  </div>
</header>

<div id="results"></div>

<script>
async function geocode(place) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.length) throw new Error("Ort nicht gefunden");
  return data[0];
}

function isBadLead(tags) {
  const website = (tags.website || "").toLowerCase();

  if (!website) return true;

  const badPatterns = [
    "facebook",
    "instagram",
    "linktr",
    "google",
    "tripadvisor"
  ];

  return badPatterns.some(p => website.includes(p));
}

async function search() {
  const place = document.getElementById("place").value;
  const category = document.getElementById("category").value;
  const limit = parseInt(document.getElementById("limit").value);
  const resultsDiv = document.getElementById("results");

  resultsDiv.innerHTML = "Lade Leads...";

  try {
    const geo = await geocode(place);
    const bbox = geo.boundingbox;

    const query = `
      [out:json][timeout:25];
      (
        node["amenity"="${category}"](${bbox[0]},${bbox[2]},${bbox[1]},${bbox[3]});
        way["amenity"="${category}"](${bbox[0]},${bbox[2]},${bbox[1]},${bbox[3]});
      );
      out center tags;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    });

    const data = await res.json();

    resultsDiv.innerHTML = "";

    let count = 0;

    for (const el of data.elements) {
      if (count >= limit) break;

      const tags = el.tags || {};
      const name = tags.name || "Ohne Namen";

      if (!isBadLead(tags)) continue;

      const card = document.createElement("div");
      card.className = "card";

      const website = tags.website || "keine";
      const phone = tags.phone || "keine";
      const email = tags.email || "keine";

      card.innerHTML = `
        <div class="name">${name}</div>

        <div class="meta">
          🌐 Website: ${website}<br>
          📞 Telefon: ${phone}<br>
          ✉️ E-Mail: ${email}
        </div>

        <div class="badge">potenzieller Lead</div>
      `;

      resultsDiv.appendChild(card);
      count++;
    }

    if (count === 0) {
      resultsDiv.innerHTML = "Keine passenden Leads gefunden.";
    }

  } catch (err) {
    resultsDiv.innerHTML = "Fehler: " + err.message;
  }
}
</script>

</body>
</html>
