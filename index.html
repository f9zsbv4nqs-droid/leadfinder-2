<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LocalLeads AI v6</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: #e5e7eb;
}

header {
  padding: 14px;
  background: #0f172a;
  border-bottom: 1px solid #1f2937;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
}

button {
  background: #3b82f6;
  cursor: pointer;
}

/* LOADER */
#loadingWrap {
  padding: 10px 14px;
  display: none;
}

#barContainer {
  width: 100%;
  height: 10px;
  background: #1f2937;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 6px;
}

#bar {
  height: 100%;
  width: 0%;
  background: #3b82f6;
  transition: width 0.2s;
}

/* RESULTS */
#results {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.card {
  background: #111827;
  border: 1px solid #1f2937;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
}

.card:hover {
  border-color: #3b82f6;
}

.title {
  font-weight: 700;
}

/* MODAL */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

#modalContent {
  width: 360px;
  background: #111827;
  border-radius: 12px;
  padding: 14px;
}

#map {
  height: 220px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>

<div class="logo">🧲 LocalLeads AI v6</div>

<div class="controls">
  <input id="place" placeholder="Ort" />

  <select id="category">
    <option value="restaurant">Restaurant</option>
    <option value="cafe">Café</option>
    <option value="shop=hairdresser">Friseur</option>
    <option value="shop=beauty">Beauty</option>
    <option value="shop=car_repair">Auto</option>
    <option value="shop=plumber">Installateur</option>
  </select>

  <input type="range" id="limit" min="10" max="80" value="30">
  <span id="limitVal">30</span>

  <button onclick="search()">Search</button>
</div>

</header>

<!-- LOADER -->
<div id="loadingWrap">
  <div>Loading Leads... <span id="percent">0%</span></div>

  <div id="barContainer">
    <div id="bar"></div>
  </div>

  <div id="step" style="font-size:12px;color:#9ca3af;margin-top:5px;">
    Initialisierung...
  </div>
</div>

<!-- RESULTS -->
<div id="results"></div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <div id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let progress=0;
let interval;

document.getElementById("limit").oninput=e=>{
  document.getElementById("limitVal").innerText=e.target.value;
};

/* LOADER */
function setProgress(v,t){
  progress=Math.min(100,v);
  document.getElementById("percent").innerText=Math.round(progress)+"%";
  document.getElementById("bar").style.width=progress+"%";
  if(t)document.getElementById("step").innerText=t;
}

function startLoading(){
  document.getElementById("loadingWrap").style.display="block";
  setProgress(0,"Start...");
  interval=setInterval(()=>{
    if(progress<85)setProgress(progress+Math.random()*4);
  },200);
}

function stopLoading(){
  clearInterval(interval);
  setProgress(100,"Fertig");
  setTimeout(()=>{
    document.getElementById("loadingWrap").style.display="none";
  },400);
}

/* HELPERS */
function getWebsite(t){
  return t.website||t["contact:website"]||"";
}

function score(t){
  let s=50;
  if(!getWebsite(t))s+=30;
  if(!t.phone)s+=10;
  return Math.min(100,s);
}

/* GEOCODE */
async function geocode(p){
  let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${p}`);
  let d=await r.json();
  return d[0];
}

/* MODAL MAP */
let map=null;
let marker=null;

function openModal(l){

  document.getElementById("modal").style.display="flex";

  document.getElementById("modalContent").innerHTML=`
    <h3>${l.name}</h3>
    <p>🌐 ${getWebsite(l.tags)||"none"}</p>
    <p>📞 ${l.tags.phone||"none"}</p>
    <div id="map"></div>
  `;

  setTimeout(()=>{

    if(map)map.remove();

    map=L.map("map").setView([l.lat,l.lon],16);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
      attribution:"OSM"
    }).addTo(map);

    marker=L.marker([l.lat,l.lon]).addTo(map);

  },100);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  if(map){map.remove();map=null;}
}

/* MAIN */
async function search(){

  startLoading();

  let place=document.getElementById("place").value;
  let cat=document.getElementById("category").value;
  let limit=+document.getElementById("limit").value;

  document.getElementById("results").innerHTML="";

  let geo=await geocode(place);

  setProgress(40,"Suche Daten...");

  let b=geo.boundingbox;

  let filter=cat.includes("=")?
    `node["${cat.split("=")[0]}"="${cat.split("=")[1]}"]`
    :`node["amenity"="${cat}"]`;

  let q=`[out:json];
  (${filter}(${b[0]},${b[2]},${b[1]},${b[3]}));
  out;`;

  let r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:q});
  let d=await r.json();

  setProgress(75,"Bewertung...");

  let leads=[];

  for(let e of d.elements){

    let t=e.tags||{};
    leads.push({
      name:t.name||"unknown",
      tags:t,
      lat:e.lat,
      lon:e.lon,
      score:score(t)
    });

  }

  leads.sort((a,b)=>b.score-a.score);
  leads=leads.slice(0,limit);

  let results=document.getElementById("results");

  leads.forEach(l=>{

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="title">${l.name}</div>
      <div>Score: ${l.score}</div>
    `;

    div.onclick=()=>openModal(l);

    results.appendChild(div);

  });

  setProgress(100,"Fertig");
  stopLoading();
}

</script>

</body>
</html>
